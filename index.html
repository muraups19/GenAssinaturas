<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SplitSub — Assinaturas Compartilhadas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #222232;
    --border: #2a2a40;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --accent3: #6af7c8;
    --danger: #f76a6a;
    --warn: #f7d96a;
    --text: #e8e8f0;
    --text2: #9090b0;
    --text3: #5a5a7a;
    --radius: 12px;
    --radius-sm: 8px;
    --nav-h: 60px;
    --header-h: 56px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: calc(var(--nav-h) + 16px);
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
    display: flex; align-items: center; justify-content: space-between;
    height: var(--header-h);
    gap: 10px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px; flex-shrink: 0;
  }
  .logo span { color: var(--accent3); -webkit-text-fill-color: var(--accent3); }

  .header-right { display: flex; align-items: center; gap: 6px; }

  .header-month {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 20px;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .month-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent3); animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Header action menu */
  .header-menu-btn {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 1.1rem; transition: all 0.15s; flex-shrink: 0;
  }
  .header-menu-btn:hover, .header-menu-btn:active { border-color: var(--accent); color: var(--accent); }

  .header-dropdown {
    position: absolute; top: calc(var(--header-h) + 6px); right: 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 200; overflow: hidden;
    display: none;
  }
  .header-dropdown.open { display: block; }
  .dropdown-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; font-size: 0.85rem;
    cursor: pointer; color: var(--text2);
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item:active { background: var(--surface2); color: var(--text); }
  .dropdown-item.green { color: var(--accent3); }
  .dropdown-item.green:hover { color: var(--accent3); }
  #import-file-input { display: none; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    height: var(--nav-h);
    display: flex; align-items: stretch;
    padding: 0 4px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; cursor: pointer; border-radius: 8px; margin: 4px 2px;
    transition: all 0.15s; color: var(--text3);
    border: none; background: none;
    padding: 6px 2px;
  }
  .nav-item:active { transform: scale(0.92); }
  .nav-item.active { color: var(--accent); background: rgba(124,106,247,0.1); }
  .nav-icon { font-size: 1.25rem; line-height: 1; }
  .nav-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; white-space: nowrap; font-weight: 500; }

  /* ── MAIN ── */
  main {
    max-width: 700px; margin: 0 auto;
    padding: 0 1rem 1rem;
    position: relative; z-index: 1;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── SECTION HEADER ── */
  .section-header {
    padding: 1.25rem 0 1rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.75rem;
  }
  .section-title {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.3rem;
    letter-spacing: -0.5px;
  }
  .section-title span { color: var(--accent); }

  /* ── MONTH SCROLLER ── */
  .month-scroller-wrap {
    margin-bottom: 1rem;
    position: relative;
  }
  .month-scroller-label {
    font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
  }
  .month-scroller {
    display: flex; gap: 6px;
    overflow-x: auto; padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .month-scroller::-webkit-scrollbar { display: none; }
  .month-chip {
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    padding: 6px 14px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface); color: var(--text2);
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    user-select: none;
  }
  .month-chip:active { transform: scale(0.95); }
  .month-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.12); }
  .month-chip.current { border-color: var(--accent3); }

  /* ── YEAR DIVIDERS in month scroller ── */
  .month-year-group { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .month-year-label {
    font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--text3);
    text-align: center; letter-spacing: 0.5px;
  }
  .month-year-chips { display: flex; gap: 6px; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 1.25rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1rem;
  }
  .stat-label { font-size: 0.68rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 1.35rem; font-weight: 500; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--accent3); }
  .stat-value.orange { color: var(--accent2); }
  .stat-value.red { color: var(--danger); }
  .stat-card.full { grid-column: span 2; }

  /* ── CARDS ── */
  .cards-list { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    transition: border-color 0.2s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover::before { opacity: 1; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.75rem; }
  .card-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .card-icon {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-price {
    font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500;
    color: var(--accent3);
  }
  .card-price .currency { font-size: 0.78rem; color: var(--text2); }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 0.9rem; transition: all 0.15s;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  .participants-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 0.75rem; }
  .participant-chip {
    font-size: 0.72rem; font-family: 'DM Mono', monospace;
    padding: 3px 9px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2);
  }
  .participant-chip.paid { border-color: var(--accent3); color: var(--accent3); background: rgba(106,247,200,0.08); }
  .participant-chip.unpaid { border-color: var(--danger); color: var(--danger); background: rgba(247,106,106,0.08); }

  .card-meta {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 0.75rem; border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--text3);
  }
  .per-person { color: var(--accent2); font-weight: 500; }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.82rem;
    padding: 10px 18px; border-radius: var(--radius-sm);
    border: none; cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.3px; display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #9080ff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(247,106,106,0.15); color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 7px 13px; font-size: 0.75rem; }
  .btn-green { background: rgba(106,247,200,0.15); color: var(--accent3); border: 1px solid var(--accent3); }
  .btn-green:hover { background: var(--accent3); color: #0a0a0f; }
  .btn-full { width: 100%; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: calc(var(--nav-h) + 14px); right: 1rem; z-index: 90;
    width: 52px; height: 52px; border-radius: 16px;
    background: var(--accent); color: #fff;
    border: none; cursor: pointer; font-size: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(124,106,247,0.45);
    transition: all 0.2s;
  }
  .fab:active { transform: scale(0.9); }
  .fab.hidden { display: none; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.78); backdrop-filter: blur(8px);
    display: none; align-items: flex-end; justify-content: center;
    padding: 0;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; width: 100%; max-width: 640px;
    max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.25s ease;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 10px auto 0;
  }
  .modal-header {
    padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .modal-body { padding: 1.25rem; }
  .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .modal-footer .btn { flex: 1; }

  /* ── FORM ── */
  .form-group { margin-bottom: 1.1rem; }
  label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 5px; font-family: 'DM Mono', monospace; letter-spacing: 0.5px; }
  input, select {
    width: 100%; padding: 11px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 16px; /* prevents iOS zoom */
    transition: border-color 0.15s; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  select option { background: var(--surface2); }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { display: none; }
  input[type="month"] { color-scheme: dark; }
  input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  .participants-input-wrap {
    display: flex; gap: 6px; flex-wrap: wrap;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px; background: var(--surface2); min-height: 48px;
    align-items: center; cursor: text;
  }
  .participants-input-wrap:focus-within { border-color: var(--accent); }
  .p-tag {
    background: var(--surface3); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    display: flex; align-items: center; gap: 5px; color: var(--text);
  }
  .p-tag button { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 0.9rem; line-height: 1; padding: 0 2px; }
  .p-tag button:hover { color: var(--danger); }
  .p-tag-input {
    border: none; background: none; outline: none; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 16px; min-width: 80px; flex: 1;
  }

  /* ── PAYMENTS ── */
  .sub-payment-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
  }
  .sub-payment-header {
    padding: 0.9rem 1.1rem; background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .sub-payment-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
  .sub-payment-rows { padding: 0.5rem 1.1rem; }
  .payment-row {
    display: flex; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px;
  }
  .payment-row:last-child { border-bottom: none; }
  .payment-row-name { font-size: 0.88rem; flex: 1; }
  .payment-row-amount { font-family: 'DM Mono', monospace; font-size: 0.82rem; color: var(--text2); }
  .toggle-paid {
    width: 46px; height: 26px; border-radius: 13px;
    border: none; cursor: pointer; position: relative; transition: background 0.2s;
    background: var(--surface3); border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .toggle-paid.on { background: var(--accent3); border-color: var(--accent3); }
  .toggle-paid::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 18px; height: 18px; border-radius: 50%; background: #fff;
    transition: transform 0.2s;
  }
  .toggle-paid.on::after { transform: translateX(20px); }

  /* ── DEBTORS ── */
  .debtor-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.1rem;
    position: relative; overflow: hidden; margin-bottom: 10px;
  }
  .debtor-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--danger), var(--accent2));
  }
  .debtor-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.5rem; }
  .debtor-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .debtor-total { font-family: 'DM Mono', monospace; font-size: 1.4rem; color: var(--danger); }
  .debtor-subs { display: flex; flex-direction: column; gap: 3px; margin-bottom: 0.9rem; margin-top: 0.5rem; }
  .debtor-sub-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.76rem; font-family: 'DM Mono', monospace;
    color: var(--text2); padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .debtor-sub-row:last-child { border-bottom: none; }
  .debtor-months {
    font-size: 0.68rem; font-family: 'DM Mono', monospace;
    padding: 2px 7px; border-radius: 20px;
    background: rgba(247,106,106,0.15); color: var(--danger); border: 1px solid var(--danger);
  }

  /* ── EXTRATO ── */
  .extrato-config {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
  }
  .extrato-preview-wrap {
    border-radius: var(--radius); overflow: hidden;
    border: 1px solid var(--border);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 3rem 1.5rem; color: var(--text3);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; }
  .empty-state p { font-size: 0.88rem; line-height: 1.5; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: calc(var(--nav-h) + 14px); left: 50%; transform: translateX(-50%);
    z-index: 9999;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 24px; padding: 10px 20px;
    font-size: 0.82rem; color: var(--text); white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: none; transition: opacity 0.3s;
  }
  .toast.show { display: block; animation: toastIn 0.3s ease; }
  .toast.success { border-color: var(--accent3); color: var(--accent3); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  @keyframes toastIn { from{transform:translateX(-50%) translateY(10px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }

  /* ── PRINT AREA ── */
  #extrato-print-area {
    width: 400px; background: #fff; color: #111;
    font-family: 'DM Sans', sans-serif; padding: 0;
    position: fixed; left: -9999px; top: 0;
  }
  .ep-header { background: #7c6af7; color: #fff; padding: 24px 28px 20px; }
  .ep-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 4px; }
  .ep-sub { font-size: 0.75rem; opacity: 0.8; }
  .ep-name { font-size: 1.5rem; font-family: 'Syne', sans-serif; font-weight: 700; margin: 12px 0 4px; }
  .ep-period { font-size: 0.8rem; opacity: 0.8; }
  .ep-body { padding: 20px 28px; }
  .ep-total-box { background: #fff3f0; border-radius: 8px; padding: 16px; text-align: center; margin-bottom: 20px; border: 1px solid #f76a6a; }
  .ep-total-label { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
  .ep-total-value { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: 700; color: #f76a6a; }
  .ep-section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .ep-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; }
  .ep-row:last-child { border-bottom: none; }
  .ep-row-label { color: #333; }
  .ep-row-amount { font-family: 'DM Mono', monospace; color: #f76a6a; font-weight: 500; }
  .ep-row-months { font-size: 0.75rem; color: #999; }
  .ep-footer { background: #f8f8fc; padding: 16px 28px; font-size: 0.75rem; color: #999; text-align: center; border-top: 1px solid #eee; }

<script>
// ─── DATA LAYER ───────────────────────────────────────────────────────────
let DB = { subscriptions: [], payments: {} };

function loadDB() {
  try { const r = localStorage.getItem('splitsub_db'); if (r) DB = JSON.parse(r); } catch(e) {}
}
function saveDB() { localStorage.setItem('splitsub_db', JSON.stringify(DB)); }

// ─── MONTHS UTILS ─────────────────────────────────────────────────────────
const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const SHORT_MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function currentYM() { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; }
function ymKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }
function ymLabel(y, m) { return `${MONTH_NAMES[m]} ${y}`; }

// Returns earliest startMonth across all subscriptions, or 12 months ago if none
function getEarliestStart() {
  const now = currentYM();
  let earliest = { y: now.y, m: now.m };
  // default: go back 11 months (12 months total including current)
  const def = new Date(now.y, now.m - 11, 1);
  earliest = { y: def.getFullYear(), m: def.getMonth() };

  DB.subscriptions.forEach(sub => {
    if (sub.startMonth) {
      const [sy, sm] = sub.startMonth.split('-').map(Number);
      const d = new Date(sy, sm - 1, 1);
      const e = new Date(earliest.y, earliest.m, 1);
      if (d < e) earliest = { y: d.getFullYear(), m: d.getMonth() };
    }
  });
  return earliest;
}

// Get ALL months from earliest start to current month
function getAllMonthOptions() {
  const start = getEarliestStart();
  const { y: cy, m: cm } = currentYM();
  const months = [];
  const d = new Date(start.y, start.m, 1);
  const end = new Date(cy, cm, 1);
  while (d <= end) {
    const y = d.getFullYear(), m = d.getMonth();
    months.push({ y, m, key: ymKey(y, m), label: `${SHORT_MONTHS[m]} ${y}`, year: y });
    d.setMonth(d.getMonth() + 1);
  }
  return months;
}

let selectedPayMonth = ymKey(currentYM().y, currentYM().m);
let selectedDebtMonth = ymKey(currentYM().y, currentYM().m);
let selectedDashMonth = ymKey(currentYM().y, currentYM().m);

// ─── RENDER MONTH SCROLLER ────────────────────────────────────────────────
function renderMonthScroller(containerId, selectedKey, onSelect) {
  const months = getAllMonthOptions();
  const { y: cy, m: cm } = currentYM();
  const currentKey = ymKey(cy, cm);

  const container = document.getElementById(containerId);

  // Group by year
  const byYear = {};
  months.forEach(mo => {
    if (!byYear[mo.year]) byYear[mo.year] = [];
    byYear[mo.year].push(mo);
  });

  let html = '';
  Object.entries(byYear).forEach(([year, mos]) => {
    html += `<div class="month-year-group">
      <div class="month-year-label">${year}</div>
      <div class="month-year-chips">`;
    mos.forEach(o => {
      const isActive = o.key === selectedKey;
      const isCurrent = o.key === currentKey;
      html += `<div class="month-chip ${isActive ? 'active' : ''} ${isCurrent && !isActive ? 'current' : ''}"
        onclick="${onSelect}('${o.key}')">${SHORT_MONTHS[o.m]}</div>`;
    });
    html += `</div></div>`;
  });

  container.innerHTML = html;

  // Scroll active chip into view
  setTimeout(() => {
    const active = container.querySelector('.month-chip.active');
    if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function setDashMonth(key) { selectedDashMonth = key; renderAll(); }
function setPayMonth(key) { selectedPayMonth = key; renderPayments(); }
function setDebtMonth(key) { selectedDebtMonth = key; renderDebtors(); }

// ─── TABS ─────────────────────────────────────────────────────────────────
let currentTab = 'dashboard';

function switchTab(name, btn) {
  currentTab = name;
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  else {
    document.querySelectorAll('.nav-item').forEach(b => {
      if (b.dataset.tab === name) b.classList.add('active');
    });
  }
  // FAB only on subscriptions tab
  document.getElementById('fab-new').classList.toggle('hidden', name !== 'assinaturas');
  renderAll();
}

// ─── DROPDOWN ─────────────────────────────────────────────────────────────
function toggleDropdown() {
  document.getElementById('header-dropdown').classList.toggle('open');
}
function closeDropdown() {
  document.getElementById('header-dropdown').classList.remove('open');
}
document.addEventListener('click', (e) => {
  const dd = document.getElementById('header-dropdown');
  const btn = document.getElementById('menu-btn');
  if (!dd.contains(e.target) && !btn.contains(e.target)) dd.classList.remove('open');
});

// ─── EXPORT / IMPORT / SHEETS ─────────────────────────────────────────────
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsMeSO7bVtJLX9mQMuRt9cdDKNStc-rAFdtOAKG8HoLrm4Lti0lt2S_qyRV0hjcOUECQ/exec';

async function syncSheets() {
  toast('Sincronizando com a planilha...', '');

  // ── Assinaturas ──
  const exportSubs = DB.subscriptions.map(sub => ({
    id: sub.id,
    nome: sub.name,
    icon: sub.icon || '💳',
    valor: sub.value,
    inicio: sub.startMonth,
    participantes: sub.participants.join(', ')
  }));

  // ── Pagamentos: envia todos os status (Pago e Pendente) de todos os meses
  const exportPayments = [];
  const { y: cy, m: cm } = currentYM();
  const upTo = ymKey(cy, cm);

  DB.subscriptions.forEach(sub => {
    const months = getMonthsUpTo(upTo, sub.startMonth || null);
    months.forEach(mk => {
      sub.participants.forEach(p => {
        const key = `${sub.id}-${mk}-${p}`;
        exportPayments.push({
          subId: sub.id,
          assinatura: sub.name,
          mes: mk,
          participante: p,
          status: DB.payments[key] ? 'Pago' : 'Pendente'
        });
      });
    });
  });

  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ assinaturas: exportSubs, pagamentos: exportPayments })
    });
    toast('Planilha atualizada!', 'success');
  } catch(e) { toast('Erro ao sincronizar', 'error'); }
}

async function importFromSheets() {
  toast('Buscando dados da planilha...', '');
  try {
    const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'GET' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();

    if (data.error) throw new Error(data.error);
    if (!Array.isArray(data.assinaturas)) throw new Error('Resposta inválida — verifique o Apps Script');

    // Debug: log all field names received
    if (data.assinaturas.length > 0) {
      console.log('[SplitSub] Campos recebidos:', Object.keys(data.assinaturas[0]));
      console.log('[SplitSub] Primeira assinatura raw:', JSON.stringify(data.assinaturas[0]));
    }

    // ── Reconstruir subscriptions ──────────────────────────────────────
    const subscriptions = data.assinaturas.map(row => {
      // Tenta todos os possíveis nomes para o campo valor
      const rawValor = row.valor ?? row['valor total (r$)'] ?? row['valor total'] ?? row.value ?? null;
      // Converte: pode ser número JS direto, string "40.9", string "40,9", ou null
      let value = 0;
      if (rawValor !== null && rawValor !== undefined && rawValor !== '') {
        value = parseFloat(String(rawValor).replace(',', '.')) || 0;
      }
      console.log(`[SplitSub] ${row.nome}: rawValor=${JSON.stringify(rawValor)} → ${value}`);

      return {
        id:           String(row.id || '').trim(),
        name:         String(row.nome || '').trim(),
        icon:         String(row.icon || '💳').trim() || '💳',
        value,
        startMonth:   String(row.inicio || '').trim() || ymKey(currentYM().y, currentYM().m),
        participants: String(row.participantes || '').split(',').map(p => p.trim()).filter(Boolean)
      };
    }).filter(s => s.id && s.name);

    // ── Reconstruir payments ────────────────────────────────────────────
    const payments = {};
    (data.pagamentos || []).forEach(row => {
      // Tenta subId direto; fallback por nome
      let subId = String(row.subId || '').trim();
      if (!subId) {
        const found = subscriptions.find(s => s.name === String(row.assinatura || '').trim());
        if (found) subId = found.id;
      }
      const mes = String(row.mes || '').trim();
      const participante = String(row.participante || '').trim();
      if (!subId || !mes || !participante) return;
      payments[`${subId}-${mes}-${participante}`] = (String(row.status || '').trim() === 'Pago');
    });

    const total = subscriptions.length;
    const paidCount = Object.values(payments).filter(Boolean).length;
    const preview = subscriptions.map(s =>
      `${s.icon} ${s.name} — R$${s.value.toFixed(2)} — desde ${s.startMonth}`
    ).join('\n');

    if (!confirm(`Importar dados da planilha?\n\n${preview}\n\n💰 ${paidCount} pagamento(s) registrado(s)\n\n⚠️ Os dados locais serão substituídos.`)) return;

    DB = { subscriptions, payments };
    saveDB();
    renderAll();
    toast(`${total} assinatura(s) importada(s)!`, 'success');
  } catch(err) {
    console.error('[SplitSub] importFromSheets error:', err);
    toast(`Erro: ${err.message}`, 'error');
  }
}
function exportJSON() {
  const now = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const filename = `splitsub-backup-${stamp}.json`;
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast(`Backup: ${filename}`, 'success');
}

function importJSON(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.subscriptions || !data.payments) { toast('Arquivo inválido', 'error'); return; }
      if (!confirm(`Importar?\n${data.subscriptions.length} assinatura(s).\n\n⚠️ Dados atuais serão substituídos.`)) return;
      DB = data; saveDB(); renderAll();
      toast('Backup importado!', 'success');
    } catch(err) { toast('Erro ao ler JSON', 'error'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ─── RENDER ALL ───────────────────────────────────────────────────────────
function renderAll() {
  renderDashboard();
  renderSubsList();
  renderPayments();
  renderDebtors();
  renderExtratoSelects();
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────
function renderDashboard() {
  renderMonthScroller('dash-month-selector', selectedDashMonth, 'setDashMonth');
  const subs = DB.subscriptions;
  const [y, m] = selectedDashMonth.split('-').map(Number);

  let totalMonthly = 0, totalPaid = 0, totalUnpaid = 0, debtors = new Set();
  subs.forEach(sub => {
    const value = parseFloat(sub.value) || 0;
    const count = sub.participants.length || 1;
    totalMonthly += value;
    const share = value / count;
    sub.participants.forEach(p => {
      const key = `${sub.id}-${selectedDashMonth}-${p}`;
      if (DB.payments[key]) totalPaid += share;
      else { totalUnpaid += share; debtors.add(p); }
    });
  });

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">Assinaturas</div><div class="stat-value accent">${subs.length}</div></div>
    <div class="stat-card"><div class="stat-label">Total Mensal</div><div class="stat-value">${fmt(totalMonthly)}</div></div>
    <div class="stat-card"><div class="stat-label">Recebido</div><div class="stat-value green">${fmt(totalPaid)}</div></div>
    <div class="stat-card"><div class="stat-label">Em Aberto</div><div class="stat-value red">${fmt(totalUnpaid)}</div></div>
    <div class="stat-card full"><div class="stat-label">Devedores neste mês</div><div class="stat-value orange">${debtors.size} pessoa${debtors.size !== 1 ? 's' : ''}</div></div>
  `;

  document.getElementById('dash-cards').innerHTML = subs.length
    ? subs.map(sub => renderSubCard(sub, true, selectedDashMonth)).join('')
    : `<div class="empty-state"><div class="icon">📭</div><p>Nenhuma assinatura ainda.<br>Vá em <strong>Assins.</strong> para começar.</p></div>`;
}

// ─── SUBS LIST ────────────────────────────────────────────────────────────
function renderSubsList() {
  const list = document.getElementById('subs-list');
  list.innerHTML = DB.subscriptions.length
    ? DB.subscriptions.map(sub => renderSubCard(sub, false)).join('')
    : `<div class="empty-state"><div class="icon">💳</div><p>Nenhuma assinatura ainda.<br>Toque em <strong>＋</strong> para adicionar.</p></div>`;
}

function renderSubCard(sub, showPayStatus = false, monthKey = null) {
  const mk = monthKey || selectedDashMonth;
  // Guard: ensure value is a valid number
  const value = parseFloat(sub.value) || 0;
  const count = sub.participants.length || 1;
  const share = value / count;
  const paidChips = showPayStatus
    ? sub.participants.map(p => {
        const paid = DB.payments[`${sub.id}-${mk}-${p}`];
        return `<span class="participant-chip ${paid ? 'paid' : 'unpaid'}">${p} ${paid ? '✓' : '!'}</span>`;
      }).join('')
    : sub.participants.map(p => `<span class="participant-chip">${p}</span>`).join('');

  // Guard: parse startMonth safely
  let startLabel = '';
  if (sub.startMonth) {
    const match = String(sub.startMonth).match(/^(\d{4})-(\d{2})/);
    if (match) {
      const sy = parseInt(match[1]), sm = parseInt(match[2]);
      if (sm >= 1 && sm <= 12) startLabel = `desde ${SHORT_MONTHS[sm-1]}/${sy}`;
    }
  }

  return `<div class="card">
    <div class="card-header">
      <div class="card-left">
        <div class="card-icon">${sub.icon || '💳'}</div>
        <div class="card-info">
          <div class="card-name">${sub.name}</div>
          <div class="card-price"><span class="currency">R$ </span>${value.toFixed(2).replace('.',',')}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="icon-btn" onclick="openEditModal('${sub.id}')" title="Editar">✏️</button>
        <button class="icon-btn danger" onclick="deleteSub('${sub.id}')" title="Excluir">🗑</button>
      </div>
    </div>
    <div class="participants-list">${paidChips}</div>
    <div class="card-meta">
      <span>${sub.participants.length} participante${sub.participants.length !== 1 ? 's' : ''} ${startLabel ? `· <span style="color:var(--text3)">${startLabel}</span>` : ''}</span>
      <span class="per-person">${fmt(share)}/pessoa</span>
    </div>
  </div>`;
}

// ─── PAYMENTS ─────────────────────────────────────────────────────────────
function renderPayments() {
  renderMonthScroller('pay-month-selector', selectedPayMonth, 'setPayMonth');

  const container = document.getElementById('payment-cards');
  if (!DB.subscriptions.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>Nenhuma assinatura cadastrada.</p></div>`;
    return;
  }

  container.innerHTML = DB.subscriptions.map(sub => {
    if (sub.startMonth && selectedPayMonth < sub.startMonth) {
      const [sy, sm] = sub.startMonth.split('-').map(Number);
      return `<div class="sub-payment-card">
        <div class="sub-payment-header">
          <span class="sub-payment-name">${sub.icon || '💳'} ${sub.name}</span>
          <span class="badge-pending">inicia ${SHORT_MONTHS[sm-1]}/${sy}</span>
        </div>
      </div>`;
    }
    const share = sub.value / sub.participants.length;
    const paidCount = sub.participants.filter(p => DB.payments[`${sub.id}-${selectedPayMonth}-${p}`]).length;
    const rows = sub.participants.map(p => {
      const key = `${sub.id}-${selectedPayMonth}-${p}`;
      const paid = !!DB.payments[key];
      return `<div class="payment-row">
        <span class="payment-row-name">${p}</span>
        <span class="payment-row-amount">${fmt(share)}</span>
        <button class="toggle-paid ${paid ? 'on' : ''}" onclick="togglePayment('${sub.id}','${selectedPayMonth}','${p}')"></button>
      </div>`;
    }).join('');

    return `<div class="sub-payment-card">
      <div class="sub-payment-header">
        <span class="sub-payment-name">${sub.icon || '💳'} ${sub.name}</span>
        <span style="font-family:'DM Mono',monospace;font-size:0.76rem;color:var(--text2)">${paidCount}/${sub.participants.length} pagos</span>
      </div>
      <div class="sub-payment-rows">${rows}</div>
    </div>`;
  }).join('');
}

function togglePayment(subId, monthKey, person) {
  const key = `${subId}-${monthKey}-${person}`;
  DB.payments[key] = !DB.payments[key];
  saveDB(); renderAll();
  toast(DB.payments[key] ? `${person} marcado como pago ✓` : `${person} desmarcado`, DB.payments[key] ? 'success' : '');
}

// ─── DEBTORS ──────────────────────────────────────────────────────────────
function renderDebtors() {
  renderMonthScroller('debt-month-selector', selectedDebtMonth, 'setDebtMonth');

  const debtMap = computeDebts(selectedDebtMonth);
  const container = document.getElementById('debtors-list');
  const entries = Object.entries(debtMap).filter(([, d]) => d.total > 0);
  if (!entries.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><p>Nenhum devedor até este mês!</p></div>`;
    return;
  }
  container.innerHTML = entries.sort((a,b) => b[1].total - a[1].total).map(([name, d]) => {
    const subRows = d.subs.map(s =>
      `<div class="debtor-sub-row"><span>${s.icon} ${s.name}</span><span>${fmt(s.amount)} <span class="debtor-months">${s.months}m</span></span></div>`
    ).join('');
    return `<div class="debtor-card">
      <div class="debtor-card-header">
        <div>
          <div class="debtor-name">👤 ${name}</div>
          <div class="debtor-total">${fmt(d.total)}</div>
        </div>
        <button class="btn btn-sm btn-secondary" onclick="goExtrato('${name}')">📄 Extrato</button>
      </div>
      <div class="debtor-subs">${subRows}</div>
    </div>`;
  }).join('');
}

function computeDebts(upToMonthKey) {
  const debtMap = {};
  DB.subscriptions.forEach(sub => {
    const allMonths = getMonthsUpTo(upToMonthKey, sub.startMonth || null);
    const share = sub.value / sub.participants.length;
    sub.participants.forEach(p => {
      let unpaidMonths = 0;
      allMonths.forEach(mk => { if (!DB.payments[`${sub.id}-${mk}-${p}`]) unpaidMonths++; });
      if (unpaidMonths > 0) {
        if (!debtMap[p]) debtMap[p] = { total: 0, subs: [] };
        debtMap[p].total += share * unpaidMonths;
        debtMap[p].subs.push({ name: sub.name, icon: sub.icon || '💳', amount: share * unpaidMonths, months: unpaidMonths });
      }
    });
  });
  return debtMap;
}

function getMonthsUpTo(upToKey, startKey = null) {
  const [uy, um] = upToKey.split('-').map(Number);
  const endDate = new Date(uy, um - 1, 1);
  let startDate;
  if (startKey) {
    const [sy, sm] = startKey.split('-').map(Number);
    startDate = new Date(sy, sm - 1, 1);
  } else {
    startDate = new Date(endDate);
    startDate.setMonth(startDate.getMonth() - 11);
  }
  const months = [];
  const d = new Date(startDate);
  while (d <= endDate) {
    months.push(ymKey(d.getFullYear(), d.getMonth()));
    d.setMonth(d.getMonth() + 1);
  }
  return months;
}

// ─── EXTRATO ──────────────────────────────────────────────────────────────
function renderExtratoSelects() {
  const persons = getAllPersons();
  const pSel = document.getElementById('extrato-person');
  const curP = pSel.value;
  pSel.innerHTML = '<option value="">Selecione...</option>' + persons.map(p => `<option value="${p}" ${p===curP?'selected':''}>${p}</option>`).join('');

  const allMonths = getAllMonthOptions();
  const mSel = document.getElementById('extrato-month');
  const curM = mSel.value || selectedDebtMonth;
  mSel.innerHTML = [...allMonths].reverse().map(o => `<option value="${o.key}" ${o.key===curM?'selected':''}>${SHORT_MONTHS[o.m]} ${o.year}</option>`).join('');
  if (!mSel.value) mSel.value = selectedDebtMonth;
}

function renderExtrato() {
  const person = document.getElementById('extrato-person').value;
  const monthKey = document.getElementById('extrato-month').value;
  const wrap = document.getElementById('extrato-preview-wrap');
  if (!person || !monthKey) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = buildExtratoHTML(person, monthKey);
}

function buildExtratoHTML(person, upToMonthKey) {
  const [y, m] = upToMonthKey.split('-').map(Number);
  const monthLabel = ymLabel(y, m - 1);
  let rows = '', total = 0;

  DB.subscriptions.forEach(sub => {
    if (!sub.participants.includes(person)) return;
    const subMonths = getMonthsUpTo(upToMonthKey, sub.startMonth || null);
    const share = sub.value / sub.participants.length;
    let unpaidMonths = 0;
    subMonths.forEach(mk => { if (!DB.payments[`${sub.id}-${mk}-${person}`]) unpaidMonths++; });
    if (unpaidMonths > 0) {
      const amount = share * unpaidMonths;
      total += amount;
      rows += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:0.85rem">
        <span style="color:#333">${sub.icon || '💳'} ${sub.name}<br><span style="font-size:0.73rem;color:#999">${unpaidMonths} mês(es) × R$${share.toFixed(2).replace('.',',')}</span></span>
        <span style="font-family:'DM Mono',monospace;color:#f76a6a;font-weight:500">${fmt(amount)}</span>
      </div>`;
    }
  });

  if (!rows) return `<div style="padding:2rem;text-align:center;color:var(--accent3);background:var(--surface)">✅ <strong>${person}</strong> não possui débitos até ${monthLabel}!</div>`;

  return `<div style="font-family:'DM Sans',sans-serif">
    <div style="background:linear-gradient(135deg,#7c6af7,#f7a26a);padding:20px 24px;color:#fff">
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem">SplitSub</div>
      <div style="font-size:0.72rem;opacity:0.8">Extrato de Débitos</div>
      <div style="font-size:1.3rem;font-family:'Syne',sans-serif;font-weight:700;margin:10px 0 3px">👤 ${person}</div>
      <div style="font-size:0.76rem;opacity:0.8">Referência: ${monthLabel}</div>
    </div>
    <div style="padding:18px 24px;background:#fff;color:#111">
      <div style="background:#fff3f0;border-radius:8px;padding:14px;text-align:center;margin-bottom:16px;border:1px solid #f76a6a">
        <div style="font-size:0.7rem;color:#999;text-transform:uppercase;letter-spacing:1px">Total Devido</div>
        <div style="font-family:'DM Mono',monospace;font-size:1.8rem;font-weight:700;color:#f76a6a">${fmt(total)}</div>
      </div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Detalhamento</div>
      ${rows}
      <div style="padding-top:12px;margin-top:8px;font-size:0.72rem;color:#999;text-align:center;border-top:1px solid #eee">
        Gerado por SplitSub · ${new Date().toLocaleDateString('pt-BR')}
      </div>
    </div>
  </div>`;
}

async function generateExtratoImage() {
  const person = document.getElementById('extrato-person').value;
  const monthKey = document.getElementById('extrato-month').value;
  if (!person || !monthKey) { toast('Selecione participante e mês', 'error'); return; }

  const [y, m] = monthKey.split('-').map(Number);
  let rows = '', total = 0;
  DB.subscriptions.forEach(sub => {
    if (!sub.participants.includes(person)) return;
    const subMonths = getMonthsUpTo(monthKey, sub.startMonth || null);
    const share = sub.value / sub.participants.length;
    let unpaidMonths = 0;
    subMonths.forEach(mk => { if (!DB.payments[`${sub.id}-${mk}-${person}`]) unpaidMonths++; });
    if (unpaidMonths > 0) {
      const amount = share * unpaidMonths;
      total += amount;
      rows += `<div class="ep-row"><span class="ep-row-label">${sub.icon || '💳'} ${sub.name}<br><span class="ep-row-months">${unpaidMonths} mês(es) × R$${share.toFixed(2).replace('.',',')}</span></span><span class="ep-row-amount">${fmt(amount)}</span></div>`;
    }
  });

  const area = document.getElementById('extrato-print-area');
  area.innerHTML = `<div style="width:400px;background:#fff;font-family:'DM Sans',sans-serif">
    <div class="ep-header">
      <div class="ep-logo">SplitSub</div><div class="ep-sub">Extrato de Débitos</div>
      <div class="ep-name">👤 ${person}</div>
      <div class="ep-period">Referência: ${ymLabel(y, m-1)}</div>
    </div>
    <div class="ep-body">
      <div class="ep-total-box"><div class="ep-total-label">Total Devido</div><div class="ep-total-value">${fmt(total)}</div></div>
      <div class="ep-section-title">Detalhamento</div>
      ${rows || '<div style="color:#999;font-size:0.85rem;text-align:center;padding:12px 0">Nenhum débito</div>'}
    </div>
    <div class="ep-footer">Gerado por SplitSub · ${new Date().toLocaleDateString('pt-BR')}</div>
  </div>`;

  await new Promise(r => setTimeout(r, 100));
  try {
    const canvas = await html2canvas(area, { scale: 2, backgroundColor: '#fff', useCORS: true });
    const link = document.createElement('a');
    link.download = `extrato-${person.toLowerCase().replace(/\s+/g,'-')}-${monthKey}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast(`Extrato de ${person} baixado!`, 'success');
  } catch(e) { toast('Erro ao gerar imagem', 'error'); }
  area.innerHTML = '';
}

function goExtrato(person) {
  switchTab('extrato');
  setTimeout(() => {
    document.getElementById('extrato-person').value = person;
    document.getElementById('extrato-month').value = selectedDebtMonth;
    renderExtrato();
  }, 50);
}

// ─── CRUD ASSINATURAS ─────────────────────────────────────────────────────
let newParticipants = [];
let editParticipants = [];

function handleParticipantKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim();
    if (val && !newParticipants.includes(val)) { newParticipants.push(val); renderParticipantTags('participants-wrap', newParticipants, 'new'); }
    e.target.value = '';
  }
}
function handleEditParticipantKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim();
    if (val && !editParticipants.includes(val)) { editParticipants.push(val); renderParticipantTags('edit-participants-wrap', editParticipants, 'edit'); }
    e.target.value = '';
  }
}

function renderParticipantTags(wrapId, arr, mode) {
  const wrap = document.getElementById(wrapId);
  const inputId = mode === 'new' ? 'p-input' : 'edit-p-input';
  const handlerFn = mode === 'new' ? 'handleParticipantKey' : 'handleEditParticipantKey';
  wrap.innerHTML = arr.map((p,i) =>
    `<span class="p-tag">${p}<button onclick="removeParticipant(${i},'${mode}')" type="button">×</button></span>`
  ).join('') + `<input class="p-tag-input" id="${inputId}" placeholder="Nome..." onkeydown="${handlerFn}(event)" />`;
  document.getElementById(inputId).focus();
}

function removeParticipant(idx, mode) {
  if (mode === 'new') { newParticipants.splice(idx, 1); renderParticipantTags('participants-wrap', newParticipants, 'new'); }
  else { editParticipants.splice(idx, 1); renderParticipantTags('edit-participants-wrap', editParticipants, 'edit'); }
}

function saveSubscription() {
  const name = document.getElementById('sub-name').value.trim();
  const icon = document.getElementById('sub-icon').value.trim() || '💳';
  const value = parseFloat(document.getElementById('sub-value').value);
  const startMonth = document.getElementById('sub-start').value || ymKey(currentYM().y, currentYM().m);
  const input = document.getElementById('p-input').value.trim();
  if (input && !newParticipants.includes(input)) newParticipants.push(input);

  if (!name) { toast('Informe o nome do serviço', 'error'); return; }
  if (isNaN(value) || value <= 0) { toast('Informe um valor válido', 'error'); return; }
  if (!newParticipants.length) { toast('Adicione ao menos um participante', 'error'); return; }

  DB.subscriptions.push({ id: genId(), name, icon, value, startMonth, participants: [...newParticipants] });
  saveDB(); renderAll();
  closeModal('modal-new-sub');
  toast(`${name} cadastrado!`, 'success');
}

function openEditModal(id) {
  const sub = DB.subscriptions.find(s => s.id === id); if (!sub) return;
  document.getElementById('edit-sub-id').value = id;
  document.getElementById('edit-sub-name').value = sub.name;
  document.getElementById('edit-sub-icon').value = sub.icon;
  document.getElementById('edit-sub-value').value = sub.value;
  document.getElementById('edit-sub-start').value = sub.startMonth || ymKey(currentYM().y, currentYM().m);
  editParticipants = [...sub.participants];
  renderParticipantTags('edit-participants-wrap', editParticipants, 'edit');
  openModal('modal-edit-sub');
}

function updateSubscription() {
  const id = document.getElementById('edit-sub-id').value;
  const name = document.getElementById('edit-sub-name').value.trim();
  const icon = document.getElementById('edit-sub-icon').value.trim() || '💳';
  const value = parseFloat(document.getElementById('edit-sub-value').value);
  const startMonth = document.getElementById('edit-sub-start').value || ymKey(currentYM().y, currentYM().m);
  const input = document.getElementById('edit-p-input').value.trim();
  if (input && !editParticipants.includes(input)) editParticipants.push(input);
  if (!name || isNaN(value) || value <= 0 || !editParticipants.length) { toast('Preencha todos os campos', 'error'); return; }
  const idx = DB.subscriptions.findIndex(s => s.id === id);
  DB.subscriptions[idx] = { ...DB.subscriptions[idx], name, icon, value, startMonth, participants: [...editParticipants] };
  saveDB(); renderAll();
  closeModal('modal-edit-sub');
  toast('Assinatura atualizada!', 'success');
}

function deleteSub(id) {
  if (!confirm('Excluir esta assinatura?\nOs dados de pagamento também serão removidos.')) return;
  DB.subscriptions = DB.subscriptions.filter(s => s.id !== id);
  Object.keys(DB.payments).forEach(k => { if (k.startsWith(id)) delete DB.payments[k]; });
  saveDB(); renderAll();
  toast('Assinatura removida', '');
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
function getAllPersons() {
  const set = new Set();
  DB.subscriptions.forEach(s => s.participants.forEach(p => set.add(p)));
  return [...set].sort();
}
function fmt(v) { return `R$ ${v.toFixed(2).replace('.',',')}` ; }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'modal-new-sub') {
    newParticipants = [];
    ['sub-name','sub-icon','sub-value','sub-start'].forEach(f => document.getElementById(f).value = '');
    document.getElementById('participants-wrap').innerHTML = `<input class="p-tag-input" id="p-input" placeholder="Nome..." onkeydown="handleParticipantKey(event)" />`;
  }
}
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─── INIT ─────────────────────────────────────────────────────────────────
loadDB();
const { y, m } = currentYM();
document.getElementById('current-month-label').textContent = `${SHORT_MONTHS[m]} ${y}`;
renderAll();

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});
</script>
